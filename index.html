<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="background-options">
        <button class="bg-btn active" data-bg="gradient1">渐变1</button>
        <button class="bg-btn" data-bg="gradient2">渐变2</button>
        <button class="bg-btn" data-bg="gradient3">渐变3</button>
        <button class="bg-btn" data-bg="stars">星空</button>
        <button class="bg-btn" data-bg="grid">网格</button>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">我的主页</div>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <section id="home" class="hero">
        <div class="container">
            <h1>你好，我是一名开发者</h1>
            <p>热爱技术，享受生活</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-github"></i></a>
                <a href="#"><i class="fab fa-twitter"></i></a>
            </div>
        </div>
    </section>

    <section id="about" class="about">
        <div class="container">
            <h2>关于我</h2>
            <p>这是一个简约的个人主页，展示我的基本信息和联系方式。</p>
            <div class="features">
                <div class="feature">
                    <i class="fas fa-code"></i>
                    <h3>编程</h3>
                    <p>热爱编程，不断学习新技术</p>
                </div>
                <div class="feature">
                    <i class="fas fa-book"></i>
                    <h3>阅读</h3>
                    <p>喜欢阅读各类书籍</p>
                </div>
                <div class="feature">
                    <i class="fas fa-coffee"></i>
                    <h3>咖啡</h3>
                    <p>每天一杯咖啡，保持活力</p>
                </div>
            </div>
        </div>
    </section>

    <section id="contact" class="contact">
        <div class="container">
            <h2>联系我</h2>
            <form class="contact-form" id="contactForm">
                <input type="text" placeholder="你的姓名" id="name" required>
                <input type="email" placeholder="你的邮箱" id="email" required>
                <textarea placeholder="留言内容" id="message" rows="4" required></textarea>
                <button type="submit">发送</button>
            </form>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 我的主页</p>
        </div>
    </footer>

    <div class="cursor-effects"></div>

    <script src="script.js"></script>
</body>
</html>
